name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '8', '17' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build & test
        run: mvn --batch-mode --no-transfer-progress verify -Dgpg.skip=true -Dmaven.javadoc.skip=true

      - name: Print surefire details on failure
        if: failure()
        run: |
          echo "::group::Environment"
          java -XshowSettings:properties -version 2>&1 | grep -E 'file.encoding|native.encoding|sun.jnu.encoding|user.language|user.country'
          echo "LANG=$LANG  LC_ALL=$LC_ALL  LC_CTYPE=$LC_CTYPE"
          locale 2>&1 | head -20 || true
          echo "::endgroup::"
          for f in $(find . -name 'TEST-*.xml' -path '*/surefire-reports/*'); do
            if grep -qE '<(failure|error)' "$f"; then
              echo "::group::$f"
              cat "$f"
              echo "::endgroup::"
            fi
          done
          for f in $(find . -path '*/surefire-reports/*-output.txt'); do
            echo "::group::$f"
            cat "$f"
            echo "::endgroup::"
          done

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-jdk${{ matrix.java }}
          path: '**/target/surefire-reports/'
          if-no-files-found: ignore
